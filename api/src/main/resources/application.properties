spring.application.name=Puzzleteca

# Puerto del server
server.port=8080

# ===== DATOS POSTGRES =====
spring.datasource.url=jdbc:postgresql://localhost:5432/aprendizaje
spring.datasource.username=postgres
spring.datasource.password=alumno

# Schema
spring.jpa.properties.hibernate.default_schema=puzzlesbbdd

# Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.file.name=logs/app.log
logging.level.root=INFO
logging.level.com.ignacio_natalia.api.servicios=DEBUG

spring.web.cors.allowed-origins=*